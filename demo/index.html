<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1 class="hero">Creative Developer</h1>
    </div>
    <div class="trees">
        <img class="shallowleft" src="assets/trees/shallow/left.svg"/>
        <img class="shallowright" src="assets/trees/shallow/right.svg"/>
        <img class="darkleft" src="assets/trees/dark/left.svg"/>
        <img class="darkright" src="assets/trees/dark/right.svg"/>
        <img class="blackleft" src="assets/trees/black/right.svg"/>
        <img class="blackright" src="assets/trees/black/left.svg"/>
    </div>
    <div class="view"></div>

    <div class="ripple-container">
        <div class="ripple"></div>
    </div>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            background: rgb(35, 0, 68);
            overflow-x: hidden;
            animation: sky-change 1s linear forwards;
            animation-timeline: scroll();
        }
        @keyframes sky-change {
            2% { background-color: rgb(35, 0, 68); }
            7% { background-color: rgb(156, 139, 255); }
        }
        
        .hero {
            text-align: center;
            justify-content: center;
            background: linear-gradient(90deg, rgb(68, 186, 255), indigo, violet);;
            color: transparent;
            display: flex;
            font-size: 8vw;

            font-weight: bold;
            background-size: cover;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: move_bg 0.7s linear infinite;
        }
        .view {
            height: 1500vh;
        }
        .trees {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            transform: translateY(80px);
        }
        .trees img {
            position: absolute;
            bottom: 0;
            will-change: transform, opacity;
            animation-timeline: scroll();
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.33, 1, 0.68, 1); /* easeOutCubic */
        }

        .shallowleft, .shallowright { 
            animation-name: fly-in-shallow; 
            z-index: 3; 
            width: 100vw; 
        }
        .darkleft{
            animation-name: fly-in-dark; 
            z-index: 2; 
            width: 90vw; 
        }
        .darkright { 
            animation-name: fly-in-dark; 
            z-index: 2; 
            width: 100vw; 
        }
        .blackleft, .blackright { 
            animation-name: fly-in-black; 
            z-index: 1; 
            width: 100vw; 
        }

        .shallowleft {
            left: 0px;
        }
        .darkleft{
            left: -100px;
        }
        .blackleft {
             left: -160px; 
        }
        .shallowright {
            right: -20px;
        }
        .darkright {
            right: -140px;
        }
        .blackright {
            right: -130px; 
        }

        @keyframes move_bg {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 关键帧定义 - 模拟飞入和视差 */
        /* 浅色层 (远景) */
        @keyframes fly-in-shallow {
            0% { transform: translate(-50vw, 20px); opacity: 0; }
            5%, 12% { transform: translate(0, 0); opacity: 1; }
        }
        .shallowright { animation-name: fly-in-shallow-right; }
        @keyframes fly-in-shallow-right {
            0% { transform: translate(50vw, 20px); opacity: 0; }
            5%, 12% { transform: translate(0, 0); opacity: 1; }
        }

        /* 深色层 (中景) */
        @keyframes fly-in-dark {
            0% { transform: translate(-80vw, 40px); opacity: 0; }
            7%, 12% { transform: translate(0, 0); opacity: 1; }
        }
        .darkright { animation-name: fly-in-dark-right; }
        @keyframes fly-in-dark-right {
            0% { transform: translate(80vw, 40px); opacity: 0; }
            7%, 12% { transform: translate(0, 0); opacity: 1; }
        }

        /* 黑色层 (近景) */
        @keyframes fly-in-black {
            0% { transform: translate(-120vw, 60px); opacity: 0; }
            9%, 12% { transform: translate(0, 0); opacity: 1; }
        }
        .blackright { animation-name: fly-in-black-right; }
        @keyframes fly-in-black-right {
            0% { transform: translate(120vw, 60px); opacity: 0; }
            9%, 12% { transform: translate(0, 0); opacity: 1; }
        }

        .ripple-container {
            position: relative;
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            width: 5px;
            height: 5px;
            background-color: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: transform 0.6s, opacity 0.6s;
        }

        .ripple-container:hover .ripple {
            opacity: 1;
        }
    </style>
</body>
</html>
