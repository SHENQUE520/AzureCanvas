<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - MUST星河论坛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.dark_mode.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.primary.css">
    <link rel="stylesheet" href="../css/app.major.css">
    <link rel="stylesheet" href="../css/attributes.texts.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .login-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #4a7db5;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #0a2a44;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2565b0;
            box-shadow: 0 0 0 3px rgba(37, 101, 176, 0.2);
            background-color: white;
        }

        .login-btn {
            padding: 12px;
            background-color: #2565b0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background-color: #0e4b8f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 101, 176, 0.4);
        }

        .error-message {
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            background-color: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .back-link {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>

<body class="light-mode">
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-crown"></i> 管理员登录</h1>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-input" id="username" name="username" value="xinghe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" value="123456" required>
            </div>

            <button type="submit" class="login-btn">登录</button>
            <button type="button" class="login-btn" style="background-color: #27ae60; margin-top: 10px;"
                onclick="directAccess()">直接进入</button>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="back-link">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        // 直接进入机器人管理页面
        function directAccess() {
            // 存储一个假的token
            localStorage.setItem('token', 'fake-token');
            // 直接跳转到机器人管理页面
            window.location.href = 'robots.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清空消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // 存储token
                    localStorage.setItem('token', data.token);
                    // 检查是否为管理员
                    if (data.user.role === 'admin') {
                        successMessage.textContent = '登录成功，正在跳转...';
                        successMessage.style.display = 'block';
                        // 跳转到机器人管理页面
                        setTimeout(() => {
                            window.location.href = 'robots.html';
                        }, 1000);
                    } else {
                        errorMessage.textContent = '您不是管理员，无权访问';
                        errorMessage.style.display = 'block';
                    }
                } else {
                    const error = await response.text();
                    errorMessage.textContent = '登录失败：' + error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>

</html>
