<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzureCanvas · 导航栏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.dark_mode.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.primary.css">
    <link rel="stylesheet" href="../css/app.major.css">
    
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0f; }
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://unpkg.com/meshoptimizer@0.18.1/meshopt_decoder.js"></script>
</head>

<body class="dark-mode">

    <a href="../index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回主界面
    </a>

    <div id="cube-container"></div>

    <script type="module" src="../js/effects/cube.js"></script>
</body>
</html>
