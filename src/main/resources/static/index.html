<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MUST · 星河论坛</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link rel="stylesheet" href="css/color_scheme/colors.dark_mode.css">
        <link rel="stylesheet" href="css/color_scheme/colors.primary.css">
        <link rel="stylesheet" href="css/app.major.css">
        <link rel="stylesheet" href="css/attributes.texts.css">
    </head>

    <body class="light-mode">

        <!-- 预加载动画页面 -->
        <div id="preloader">
            <div class="preloader-content">
                <div id="preloader-canvas-container"></div>
                <div class="loading-text-wrapper">
                    <span class="loading-label">Loading</span>
                    <span id="loading-percentage">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar-fill"></div>
                </div>
                <div id="loading-status">Initializing environment...</div>
            </div>
        </div>

        <div id="splash-screen">
            <div class="turbine-container">
                <div class="outer-ring"></div>
                <div class="turbine-wrapper"></div>
            </div>
            <canvas id="splash-canvas"></canvas>
            <div class="splash-logo">
                <i class="fas fa-university"></i>
                <div class="logo-text">MUST</div>
                <div class="logo-sub">澳门科技大学</div>
                <div style="font-size:1rem; margin-top:10px; color: rgba(255,255,255,0.6); ">点击进入 · 星河社区</div>
            </div>
        </div>

<!--        <div id="main-interface">-->
            <div class="top-nav">
                <div class="nav-left">
                    <div class="nav-logo">
                        <i class="fas fa-university"></i>
                        <span class="azurecanvas">AzureCanvas</span>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-item"><i class="fas fa-search"></i> 搜索</div>
                    <div class="nav-item" id="themeToggle"><i class="fas fa-moon" id="themeIcon"></i> 夜间模式</div>
<!--                    <a href="cube/index.html" class="nav-item" style="text-decoration: none; color: inherit;"><i class="fas fa-cube"></i> 立方体页面</a>-->
                    <div class="nav-item"><i class="fas fa-bell"></i> 消息</div>
                    <div class="avatar-small">登录</div>
                </div>
            </div>

            <!-- 仪表盘布局 -->

<!--        </div>-->

        <!-- 立方体容器 -->
        <div id="cube-container"></div>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
                }
            }
        </script>
        <script src="js/effects/starfields.js"></script>
        <script src="js/effects/vortex_stairs.js"></script>
        <script type="module" src="js/futurecube/cube.js"></script>
        <script type="module" src="js/futurecube/cube.interactions.js"></script>
        <script type="module" src="js/futurecube/audio.controller.js"></script>
        <script src="js/app/app.js"></script>

    </body>

</html>
