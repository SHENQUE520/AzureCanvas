<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的空间 - AzureTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body {
            background-image: linear-gradient(to top, #9795f0 0%, #fbc8d4 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm h-14 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-purple-600 font-black text-xl">
            <span>闲置</span><span class="text-purple-700">AzureTrade</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6 pt-6 px-4 pb-10">

        <aside class="w-full md:w-56 flex-shrink-0">
            <div class="bg-white rounded-2xl p-5 shadow-sm sticky top-20">
                <nav class="space-y-0.5 text-sm">
                    <a href="profile.html" class="flex items-center space-x-3 px-4 py-2.5 bg-purple-50 text-purple-600 font-bold rounded-lg">
                        <span>🏠</span><span>我的空间</span>
                    </a>

                    <div>
                        <div class="flex items-center justify-between px-4 py-2.5 text-gray-800 font-bold cursor-pointer hover:bg-gray-50 rounded-lg transition" id="trade-toggle">
                            <div class="flex items-center space-x-3"><span>📋</span><span>我的交易</span></div>
                            <svg class="w-3.5 h-3.5 text-gray-400 transition-transform rotate-180" id="trade-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div id="trade-sub" class="ml-6 space-y-0.5">
                            <a href="mypublish.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我发布的</span>
                                <span id="sidebar-publish-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="sales.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我卖出的</span>
                                <span id="sidebar-sell-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="purchases.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我买到的</span>
                                <span id="sidebar-buy-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                        </div>
                    </div>

                    <a href="favorites.html" class="flex items-center justify-between px-4 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition">
                        <div class="flex items-center space-x-3"><span>⭐</span><span>我的收藏</span></div>
                        <span id="sidebar-fav-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                    </a>

                    <!-- 我的投稿 -->
                    <div>
                        <div class="flex items-center justify-between px-4 py-2.5 text-gray-800 font-bold cursor-pointer hover:bg-gray-50 rounded-lg transition" id="contribution-toggle">
                            <div class="flex items-center space-x-3"><span>📝</span><span>我的投稿</span></div>
                            <svg class="w-3.5 h-3.5 text-gray-400 transition-transform rotate-180" id="contribution-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div id="contribution-sub" class="ml-6 space-y-0.5">
                            <a href="my-articles.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我的文章</span>
                                <span id="sidebar-article-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="my-maps.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我的地图</span>
                                <span id="sidebar-map-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">1</span>
                            </a>
                            <a href="my-moments.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>我的动态</span>
                                <span id="sidebar-moment-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                        </div>
                    </div>

                    <!-- 我的点赞 -->
                    <div>
                        <div class="flex items-center justify-between px-4 py-2.5 text-gray-800 font-bold cursor-pointer hover:bg-gray-50 rounded-lg transition" id="like-toggle">
                            <div class="flex items-center space-x-3"><span>👍</span><span>我的点赞</span></div>
                            <svg class="w-3.5 h-3.5 text-gray-400 transition-transform rotate-180" id="like-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div id="like-sub" class="ml-6 space-y-0.5">
                            <a href="my-likes.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>文章</span>
                                <span id="sidebar-like-article-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="my-likes.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>动态</span>
                                <span id="sidebar-like-moment-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                            <a href="my-likes.html" class="flex items-center justify-between px-4 py-2 text-gray-500 hover:text-purple-600 hover:bg-gray-50 rounded-lg transition">
                                <span>地图</span>
                                <span id="sidebar-like-map-count" class="text-xs text-purple-600 font-bold bg-purple-50 px-2 py-0.5 rounded-full">0</span>
                            </a>
                        </div>
                    </div>
                </nav>
                <div class="mt-6 pt-4 border-t border-gray-100 space-y-2">
                    <a href="trade.html" class="flex items-center justify-center space-x-2 px-4 py-2.5 bg-gray-50 text-gray-500 hover:text-purple-600 hover:bg-purple-50 rounded-xl transition font-medium text-sm">
                        <span>&larr;</span>
                        <span>返回大厅</span>
                    </a>
                    <button id="logout-btn" class="w-full flex items-center justify-center space-x-2 px-4 py-2.5 bg-purple-100 text-purple-700 hover:bg-purple-200 rounded-xl transition font-medium text-sm">
                        <span>🚪</span>
                        <span>退出登录</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 max-w-4xl">
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden min-h-[80vh]">
                
                <div id="profile-banner" class="h-48 bg-gradient-to-r from-purple-400 via-pink-300 to-yellow-300 relative cursor-pointer group" title="点击更换背景">
                    <input type="file" id="banner-input" accept="image/*" class="hidden">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition flex items-center justify-center">
                        <span class="text-white text-sm bg-black/30 px-4 py-2 rounded-full opacity-0 group-hover:opacity-100 transition backdrop-blur-sm">点击更换背景</span>
                    </div>
                    <button id="edit-profile-btn" class="absolute top-4 right-4 bg-black/20 text-white px-4 py-1.5 rounded-full text-sm backdrop-blur-sm hover:bg-black/30 transition z-10">
                        编辑主页
                    </button>
                </div>

                <div class="px-6 pb-4 relative mt-[-40px]">
                    <div class="flex justify-between items-end mb-3">
                        <div id="profile-avatar" class="w-20 h-20 rounded-full border-4 border-white bg-gradient-to-br from-purple-400 to-pink-400 shadow-md flex items-center justify-center text-white font-bold text-3xl z-10 relative">
                            A
                        </div>
                    </div>

                    <div class="mb-2">
                        <div class="flex items-center gap-2 flex-wrap mb-1">
                            <h2 id="profile-username" class="text-xl font-black text-gray-900">Azure同学</h2>
                            <span id="gender-icon" class="text-base hidden"></span>
                            <span class="bg-yellow-100 text-yellow-700 text-[10px] px-2 py-0.5 rounded-full font-bold">买家信用极好</span>
                            <span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold">卖家信用极好</span>
                        </div>
                        <p id="profile-bio" class="text-xs text-gray-400">这个人很懒，什么都没写~</p>
                        <p id="profile-email" class="text-xs text-gray-400 mt-1 hidden">📧 <span></span></p>
                        <p id="profile-join-date" class="text-xs text-gray-400 mt-1">📅 注册时间：<span></span></p>
                    </div>

                    <div class="flex items-center gap-6 text-sm mt-4 mb-2">
                        <a href="#" id="followers-link" class="flex items-baseline gap-1 hover:text-purple-600 transition">
                            <span id="profile-followers" class="font-black text-gray-900 text-lg">0</span>
                            <span class="text-gray-500">粉丝</span>
                        </a>
                        <a href="following.html" class="flex items-baseline gap-1 hover:text-purple-600 transition">
                            <span id="profile-following" class="font-black text-gray-900 text-lg">0</span>
                            <span class="text-gray-500">关注</span>
                        </a>
                        <a href="sales.html" class="flex items-baseline gap-1 hover:text-purple-600 transition">
                            <span id="profile-sell" class="font-black text-gray-900 text-lg">0</span>
                            <span class="text-gray-500">卖出</span>
                        </a>
                        <a href="purchases.html" class="flex items-baseline gap-1 hover:text-purple-600 transition">
                            <span id="profile-buy" class="font-black text-gray-900 text-lg">0</span>
                            <span class="text-gray-500">买到</span>
                        </a>
                    </div>
                </div>

                <div class="flex items-center gap-8 px-6 h-12 border-t border-b border-gray-100 sticky top-14 bg-white z-40">
                    <div class="seller-tab relative h-full flex items-center cursor-pointer text-sm font-bold text-purple-600 transition-all" data-tab="items">
                        <span>宝贝 <span class="text-gray-400 font-normal ml-0.5" id="items-count">51</span></span>
                        <div class="tab-bar absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-0.5 bg-purple-600 rounded-full transition-all duration-300 opacity-100 scale-100"></div>
                    </div>
                    <div class="seller-tab relative h-full flex items-center cursor-pointer text-sm text-gray-500 hover:text-purple-600 transition-all" data-tab="reviews">
                        <span>信用及评价 <span class="text-gray-400 font-normal ml-0.5" id="reviews-count-tab">29</span></span>
                        <div class="tab-bar absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-0.5 bg-purple-600 rounded-full transition-all duration-300 opacity-0 scale-0"></div>
                    </div>
                </div>

                <div class="p-4 bg-gray-50/50 min-h-[50vh]">
                    
                    <div id="profile-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                    
                    <div id="reviews-panel" class="hidden">
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            <label class="cursor-pointer">
                                <input type="radio" name="review_filter" value="all" class="peer hidden" checked>
                                <div class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition shadow-sm">
                                    全部 <span id="count-all" class="ml-0.5 opacity-80"></span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="review_filter" value="good" class="peer hidden">
                                <div class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition shadow-sm">
                                    好评 <span id="count-good" class="ml-0.5 opacity-80"></span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="review_filter" value="buyer" class="peer hidden">
                                <div class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition shadow-sm">
                                    来自买家 <span id="count-buyer" class="ml-0.5 opacity-80"></span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="review_filter" value="seller" class="peer hidden">
                                <div class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition shadow-sm">
                                    来自卖家 <span id="count-seller" class="ml-0.5 opacity-80"></span>
                                </div>
                            </label>
                        </div>

                        <div id="reviews-list" class="space-y-3"></div>
                    </div>

                </div>

                

                </div>
            </div>
        </main>
    </div>

    <!-- ===== 编辑主页弹窗 ===== -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0">
                <h2 class="text-lg font-black text-gray-900">编辑主页</h2>
                <button id="edit-close-btn" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <form id="edit-profile-form" class="px-6 py-5 space-y-5 overflow-y-auto flex-1">
                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">昵称</label>
                    <input type="text" name="username" placeholder="请输入昵称"
                        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">头像</label>
                    <div class="flex items-center gap-4">
                        <div id="edit-avatar-preview" class="w-16 h-16 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center text-white text-2xl font-bold shadow-md overflow-hidden">A</div>
                        <label class="px-4 py-2 bg-purple-50 text-purple-600 rounded-lg text-sm font-medium cursor-pointer hover:bg-purple-100 transition">
                            更换头像
                            <input type="file" name="avatar" accept="image/*" class="hidden" id="edit-avatar-input">
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">简介</label>
                    <textarea name="bio" rows="3" placeholder="介绍一下自己吧..."
                        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none resize-none transition"></textarea>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">个人关联邮箱</label>
                    <input type="email" name="email" placeholder="请输入邮箱"
                        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">性别</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="gender" value="male" class="peer hidden">
                            <div class="px-5 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">男</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="gender" value="female" class="peer hidden">
                            <div class="px-5 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">女</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="gender" value="secret" class="peer hidden" checked>
                            <div class="px-5 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">保密</div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">生日</label>
                    <input type="date" name="birthday"
                        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1.5">喜欢的</label>
                    <div id="interest-tags" class="flex flex-wrap gap-2 mb-3">
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="摄影" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">摄影</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="音乐" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">音乐</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="编程" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">编程</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="旅行" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">旅行</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="绿植" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">绿植</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="宠物" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">宠物</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="美食" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">美食</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="运动" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">运动</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="阅读" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">阅读</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="游戏" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">游戏</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="手工" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">手工</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="interest_tag" value="追剧" class="peer hidden"><div class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-xs peer-checked:bg-purple-100 peer-checked:text-purple-700 peer-checked:border-purple-200 peer-checked:font-bold transition">追剧</div></label>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="custom-interest-input" placeholder="自定义兴趣，回车添加"
                            class="flex-1 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-400 outline-none transition">
                        <button type="button" id="add-interest-btn" class="px-4 py-2 bg-purple-50 text-purple-600 rounded-lg text-sm font-medium hover:bg-purple-100 transition">添加</button>
                    </div>
                    <div id="custom-interests" class="flex flex-wrap gap-2 mt-2"></div>
                </div>

                <div class="pt-2 pb-1">
                    <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition shadow-lg transform active:scale-[0.98]">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

function sortFollowers(type) {
    var sorted = followers.slice();
    if (type === 'time-asc') {
        sorted.sort(function(a, b) {
            return new Date(b.followTime) - new Date(a.followTime);
        });
    } else if (type === 'time') {
        sorted.sort(function(a, b) {
            return b.fans - a.fans;
        });
    }
    return sorted;
}

// ========== localStorage 持久化 + API 调用 ==========
function loadProfileFromStorage() {
    var saved = localStorage.getItem('userProfile');
    if (!saved) return null;
    try { return JSON.parse(saved); } catch (e) { return null; }
}

function saveProfileToStorage(data) {
    var existing = loadProfileFromStorage() || {};
    Object.keys(data).forEach(function (k) { existing[k] = data[k]; });
    localStorage.setItem('userProfile', JSON.stringify(existing));
}

function applyProfileToPage(data) {
    var profileUsername = document.getElementById('profile-username');
    var profileAvatar = document.getElementById('profile-avatar');
    var profileBio = document.getElementById('profile-bio');
    var profileFollowers = document.getElementById('profile-followers');
    var profileFollowing = document.getElementById('profile-following');
    var profilePosts = document.getElementById('profile-posts');
    var sidebarFav = document.getElementById('sidebar-fav-count');

    if (profileUsername && data.username) profileUsername.textContent = data.username;

    // 显示性别图标
    var genderIcon = document.getElementById('gender-icon');
    if (genderIcon && data.gender) {
        if (data.gender === 'male') {
            genderIcon.textContent = '♂';
            genderIcon.style.color = '#3b82f6';
            genderIcon.classList.remove('hidden');
        } else if (data.gender === 'female') {
            genderIcon.textContent = '♀';
            genderIcon.style.color = '#ec4899';
            genderIcon.classList.remove('hidden');
        } else {
            genderIcon.classList.add('hidden');
        }
    }

    if (profileAvatar) {
        if (data.avatar_url) {
            profileAvatar.innerHTML = '<img src="' + data.avatar_url + '" class="w-20 h-20 rounded-full object-cover">';
            profileAvatar.className = 'w-20 h-20 rounded-full border-4 border-white shadow-md overflow-hidden z-10 relative';
        } else if (data.username) {
            profileAvatar.textContent = data.username.charAt(0).toUpperCase();
        }
    }

    if (profileBio) profileBio.textContent = data.bio || '这个人很懒，什么都没写~';

    var profileEmail = document.getElementById('profile-email');
    if (profileEmail && data.email) {
        profileEmail.querySelector('span').textContent = data.email;
        profileEmail.classList.remove('hidden');
    }

    // 显示注册时间
    var profileJoinDate = document.getElementById('profile-join-date');
    if (profileJoinDate && data.createdAt) {
        var joinDate = new Date(data.createdAt);
        var formattedDate = joinDate.getFullYear() + '年' + (joinDate.getMonth() + 1) + '月' + joinDate.getDate() + '日';
        profileJoinDate.querySelector('span').textContent = formattedDate;
    } else if (profileJoinDate && data.joinedAt) {
        var joinDate = new Date(data.joinedAt);
        var formattedDate = joinDate.getFullYear() + '年' + (joinDate.getMonth() + 1) + '月' + joinDate.getDate() + '日';
        profileJoinDate.querySelector('span').textContent = formattedDate;
    }

    if (profileFollowers) profileFollowers.textContent = data.followers || 0;
    if (profileFollowing) profileFollowing.textContent = data.followings || data.following || 0;

    // 从 localStorage 统计各项数量
    var publishedItems = JSON.parse(localStorage.getItem('publishedItems') || '[]');
    var soldItems = JSON.parse(localStorage.getItem('soldItems') || '[]');
    var boughtItems = JSON.parse(localStorage.getItem('boughtItems') || '[]');
    var favoriteItems = JSON.parse(localStorage.getItem('favoriteItems') || '[]');

    var postsCount = data.posts || publishedItems.length;
    var sellCount = data.sell || soldItems.length;
    var buyCount = data.buy || boughtItems.length;
    var favCount = data.favorites || favoriteItems.length;

    if (profilePosts) profilePosts.textContent = postsCount;
    if (document.getElementById('items-count')) document.getElementById('items-count').textContent = postsCount;

    var profileSell = document.getElementById('profile-sell');
    var profileBuy = document.getElementById('profile-buy');
    if (profileSell) profileSell.textContent = sellCount;
    if (profileBuy) profileBuy.textContent = buyCount;

    // 侧边栏气泡
    var sidebarPublish = document.getElementById('sidebar-publish-count');
    var sidebarSell = document.getElementById('sidebar-sell-count');
    var sidebarBuy = document.getElementById('sidebar-buy-count');

    if (sidebarPublish) sidebarPublish.textContent = postsCount;
    if (sidebarSell) sidebarSell.textContent = sellCount;
    if (sidebarBuy) sidebarBuy.textContent = buyCount;

    var panelSell = document.getElementById('panel-sell-count');
    if (panelSell) panelSell.textContent = sellCount;

    if (sidebarFav) {
        sidebarFav.textContent = favCount;
    }
}

    try {
        var response = await fetch('/api/users/me', {
            method: 'GET',

var customInterests = [];

function openEditModal() {
    var usernameEl = document.getElementById('profile-username');
    var bioEl = document.getElementById('profile-bio');
    if (usernameEl) editForm.username.value = usernameEl.textContent;
    if (bioEl) editForm.bio.value = bioEl.textContent === '这个人很懒，什么都没写~' ? '' : bioEl.textContent;

    // 从 localStorage 回填 email、性别、生日、兴趣
    var saved = loadProfileFromStorage() || {};
    if (saved.email) editForm.email.value = saved.email;
    if (saved.gender) {
        var genderRadio = editForm.querySelector('input[name="gender"][value="' + saved.gender + '"]');
        if (genderRadio) genderRadio.checked = true;
    }
    if (saved.birthday) editForm.birthday.value = saved.birthday;
    if (saved.interests) {
        var interests = saved.interests.split(',');
        var presetTags = document.querySelectorAll('input[name="interest_tag"]');
        presetTags.forEach(function(cb) { cb.checked = interests.indexOf(cb.value) !== -1; });
        customInterests = [];
        interests.forEach(function(tag) {
            var isPreset = false;
            presetTags.forEach(function(cb) { if (cb.value === tag) isPreset = true; });
            if (!isPreset && tag.trim()) customInterests.push(tag.trim());
        });
        renderCustomInterests();
    }

    var avatarEl = document.getElementById('profile-avatar');
    if (avatarEl) {
        var img = avatarEl.querySelector('img');
        if (img) {
            editAvatarPreview.innerHTML = '<img src="' + img.src + '" class="w-16 h-16 rounded-full object-cover">';
        } else {
            editAvatarPreview.textContent = avatarEl.textContent;
        }
    }

    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
}

function closeEditModal() {
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
}

if (editBtn) editBtn.addEventListener('click', openEditModal);
if (editCloseBtn) editCloseBtn.addEventListener('click', closeEditModal);
editModal.addEventListener('click', function (e) {

});

function addCustomInterest(text) {
    text = text.trim();
    if (!text || customInterests.indexOf(text) !== -1) return;
    customInterests.push(text);
    renderCustomInterests();
}

function renderCustomInterests() {
    customInterestsContainer.innerHTML = '';
    customInterests.forEach(function (tag, idx) {
        var span = document.createElement('span');
        span.className = 'inline-flex items-center gap-1 px-3 py-1.5 bg-purple-100 text-purple-700 rounded-full text-xs font-bold';
        span.innerHTML = tag + '<button type="button" class="ml-1 text-purple-400 hover:text-purple-700 text-sm leading-none">&times;</button>';
        span.querySelector('button').addEventListener('click', function () {
            customInterests.splice(idx, 1);
            renderCustomInterests();
        });
        customInterestsContainer.appendChild(span);
    });
}

if (addInterestBtn) {
    addInterestBtn.addEventListener('click', function () {
        addCustomInterest(customInterestInput.value);
        customInterestInput.value = '';
    });
}
if (customInterestInput) {
    customInterestInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addCustomInterest(customInterestInput.value);
            customInterestInput.value = '';
        }
    });
}

// ========== 保存编辑 ==========
editForm.addEventListener('submit', async function (e) {
    e.preventDefault();

    var formData = new FormData(editForm);
    var username = formData.get('username') || '';
    var bio = formData.get('bio') || '';
    var email = formData.get('email') || '';
    var gender = formData.get('gender') || 'secret';
    var birthday = formData.get('birthday') || '';

    // 收集兴趣：预设标签 + 自定义
    var selectedTags = [];
    document.querySelectorAll('input[name="interest_tag"]:checked').forEach(function (cb) {
        selectedTags.push(cb.value);
    });
    var allInterests = selectedTags.concat(customInterests).join(',');

    // 头像处理
    var avatarFile = editAvatarInput.files[0];
    var avatarUrl = '';
    var previewImg = editAvatarPreview.querySelector('img');
    if (previewImg) avatarUrl = previewImg.src;

    // 更新页面显示
    var profileUsername = document.getElementById('profile-username');
    var profileBio = document.getElementById('profile-bio');
    var profileAvatar = document.getElementById('profile-avatar');

    if (profileUsername && username) profileUsername.textContent = username;
    if (profileBio) profileBio.textContent = bio || '这个人很懒，什么都没写~';

    if (avatarUrl && profileAvatar) {
        profileAvatar.innerHTML = '<img src="' + avatarUrl + '" class="w-20 h-20 rounded-full object-cover">';
        profileAvatar.className = 'w-20 h-20 rounded-full border-4 border-white shadow-md overflow-hidden z-10 relative';
    }

    // 保存到 localStorage
    saveProfileToStorage({
        username: username,
        bio: bio,
        email: email,
        gender: gender,
        birthday: birthday,
        interests: allInterests,
        avatar_url: avatarUrl
    });

    // 调用后端保存
    try {
        var uploadData = new FormData();
        uploadData.append('username', username);
        uploadData.append('bio', bio);
        uploadData.append('email', email);
        uploadData.append('gender', gender);
        uploadData.append('birthday', birthday);
        uploadData.append('interests', allInterests);
        if (avatarFile) uploadData.append('avatar', avatarFile);

        await fetch('/api/users/profile', {
            method: 'PUT',
            credentials: 'include',
            body: uploadData
        });
    } catch (err) {
        console.error('保存个人信息失败:', err);
    }

    closeEditModal();
});
</script>
