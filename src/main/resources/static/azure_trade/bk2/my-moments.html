<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的动态 - AzureTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm h-14 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-purple-600 font-black text-xl">
            <span>闲置</span><span class="text-purple-700">AzureTrade</span>
        </div>
        <div class="ml-auto flex items-center space-x-4">
            <a href="profile.html" class="text-sm text-gray-500 hover:text-purple-600">← 返回主页</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto pt-6 px-4 pb-10">

        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-black text-gray-900">💬 我的动态</h1>
                <p class="text-xs text-gray-400 mt-1">你发布的所有动态消息</p>
            </div>
        </div>

        <!-- 发布动态 -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-6">
            <textarea id="moment-input" rows="3" placeholder="分享你此刻的想法..." class="w-full border-0 text-sm focus:outline-none resize-none placeholder-gray-400"></textarea>
            <div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100">
                <div class="flex gap-3 text-gray-400 text-sm">
                    <span class="cursor-pointer hover:text-purple-500 transition">📷 图片</span>
                    <span class="cursor-pointer hover:text-purple-500 transition">📍 位置</span>
                    <span class="cursor-pointer hover:text-purple-500 transition"># 话题</span>
                </div>
                <button id="post-moment-btn" class="px-5 py-1.5 bg-purple-600 text-white rounded-full text-xs font-bold hover:bg-purple-700 transition">发布</button>
            </div>
        </div>

        <div id="moment-list" class="space-y-4"></div>

        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-5xl mb-4">💬</div>
            <p class="text-gray-400 text-sm">你还没有发布动态</p>
            <p class="text-gray-300 text-xs mt-1">分享你的校园生活吧~</p>
        </div>
    </div>

<script>
var moments = JSON.parse(localStorage.getItem('myMoments') || '[]');
var savedProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
var myName = savedProfile.username || 'Azure同学';

if (moments.length === 0) {
    moments = [
        { id: 'mo1', text: '今天在食堂面交了一单，对方同学人超好，东西完好无损！校园交易真的很方便 🎉', likes: 15, comments: 3, createdAt: '2026-04-24 18:30', liked: false },
        { id: 'mo2', text: '期末季来临，准备把用不上的教材整理一下挂到AzureTrade上，有需要高数和线代课本的同学可以关注我～', likes: 8, comments: 1, createdAt: '2026-04-22 10:15', liked: false },
        { id: 'mo3', text: '入手了一把二手机械键盘，Cherry红轴手感太棒了！卖家包装得很用心，信用分系统真的靠谱👍', likes: 22, comments: 5, createdAt: '2026-04-19 21:00', liked: false }
    ];
    localStorage.setItem('myMoments', JSON.stringify(moments));
}

var momentList = document.getElementById('moment-list');
var emptyState = document.getElementById('empty-state');

function timeAgo(dateStr) {
    var now = new Date();
    var then = new Date(dateStr);
    var diff = Math.floor((now - then) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 604800) return Math.floor(diff / 86400) + '天前';
    return dateStr;
}

function renderMoments() {
    momentList.innerHTML = '';
    if (moments.length === 0) {
        momentList.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
    }
    momentList.classList.remove('hidden');
    emptyState.classList.add('hidden');

    moments.forEach(function(m, idx) {
        var initial = myName.charAt(0).toUpperCase();
        var div = document.createElement('div');
        div.className = 'bg-white rounded-xl p-5 shadow-sm border border-gray-100';
        div.innerHTML =
            '<div class="flex items-start gap-3">' +
                '<div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center text-white font-bold text-sm shrink-0">' + initial + '</div>' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="flex items-center gap-2 mb-1">' +
                        '<span class="text-sm font-bold text-gray-900">' + myName + '</span>' +
                        '<span class="text-xs text-gray-400">' + timeAgo(m.createdAt) + '</span>' +
                    '</div>' +
                    '<p class="text-sm text-gray-700 leading-relaxed mb-3 whitespace-pre-wrap">' + m.text + '</p>' +
                    '<div class="flex items-center gap-6 text-xs text-gray-400">' +
                        '<button class="like-moment-btn flex items-center gap-1 hover:text-red-500 transition ' + (m.liked ? 'text-red-500' : '') + '" data-idx="' + idx + '">' +
                            (m.liked ? '❤️' : '🤍') + ' ' + m.likes +
                        '</button>' +
                        '<span class="flex items-center gap-1">💬 ' + m.comments + '</span>' +
                        '<button class="delete-moment-btn text-gray-300 hover:text-red-500 transition ml-auto" data-idx="' + idx + '">删除</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
        momentList.appendChild(div);
    });

    // 点赞事件
    document.querySelectorAll('.like-moment-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var i = parseInt(btn.dataset.idx);
            moments[i].liked = !moments[i].liked;
            moments[i].likes += moments[i].liked ? 1 : -1;
            localStorage.setItem('myMoments', JSON.stringify(moments));
            renderMoments();
        });
    });

    // 删除事件
    document.querySelectorAll('.delete-moment-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            if (confirm('确定删除这条动态吗？')) {
                moments.splice(parseInt(btn.dataset.idx), 1);
                localStorage.setItem('myMoments', JSON.stringify(moments));
                renderMoments();
            }
        });
    });
}

// 发布动态
document.getElementById('post-moment-btn').addEventListener('click', function() {
    var text = document.getElementById('moment-input').value.trim();
    if (!text) { alert('请输入动态内容'); return; }
    var now = new Date();
    var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    moments.unshift({ id: 'mo' + Date.now(), text: text, likes: 0, comments: 0, createdAt: timeStr, liked: false });
    localStorage.setItem('myMoments', JSON.stringify(moments));
    document.getElementById('moment-input').value = '';
    renderMoments();
});

renderMoments();
</script>

</body>
</html>
