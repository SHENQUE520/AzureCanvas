    <!-- 编辑商品弹窗 -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">

            </div>
            <form id="edit-form" class="px-8 py-6 space-y-8 overflow-y-auto flex-1">

                        <label class="block text-sm text-gray-600 mb-2">商品名称 <span class="text-red-500">*</span></label>

                            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none bg-white">

                            <option>美妆/护肤/个护</option>
                            <option>乐器/文具/手工</option>
                            <option>代步/租赁/其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">商品描述</label>
                        <textarea name="description" id="edit-description" rows="4" placeholder="描述一下宝贝的来源、成色细节、转让原因..."

                </div>

                        <label class="block text-sm text-gray-600 mb-2">商品定价 (元) <span class="text-red-500">*</span></label>

                    </div>
                    <div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2.5 rounded-full shadow-lg text-sm z-[60] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none"></div>

<script>
var currentUsername = '';
var pubItems = [
    { id:'p1', title:'出一套写代码用的机械键盘+鼠标套装', price:150, emoji:'⌨️', bg:'from-indigo-100 to-purple-200', wants:12, views:89, status:'selling', time:'2小时前' },
    { id:'p2', title:'高等数学同济第七版 上下册 几乎全新', price:15, emoji:'📘', bg:'from-blue-100 to-sky-200', wants:8, views:156, status:'selling', time:'5小时前' },
    { id:'p3', title:'iPad Air5 64G WiFi 蓝色 带笔和壳', price:2800, emoji:'📱', bg:'from-cyan-100 to-teal-200', wants:25, views:342, status:'selling', time:'1天前' },
    { id:'p4', title:'C语言程序设计 谭浩强 第五版 九成新', price:5, emoji:'📓', bg:'from-green-100 to-emerald-200', wants:3, views:67, status:'sold', time:'3天前' },
    { id:'p5', title:'小米迷你冰箱 45L 单门 白色 宿舍用', price:250, emoji:'🧊', bg:'from-amber-100 to-yellow-200', wants:6, views:201, status:'sold', time:'5天前' },
    { id:'p6', title:'小米台式风扇 静音款 三挡风速 搬走带不了', price:20, emoji:'🌀', bg:'from-rose-100 to-pink-200', wants:2, views:45, status:'off', time:'1周前' }
];

var statusMap = {
    selling: { text:'在售中', cls:'bg-green-100 text-green-600' },
    sold:    { text:'已卖出', cls:'bg-gray-100 text-gray-500' },
    off:     { text:'已下架', cls:'bg-red-50 text-red-400' }
};

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('opacity-0', '-translate-y-4');
    t.classList.add('opacity-100', 'translate-y-0');
    setTimeout(function() {
        t.classList.remove('opacity-100', 'translate-y-0');
        t.classList.add('opacity-0', '-translate-y-4');
    }, 2000);
}

function updateTabCounts() {
    var allCount = pubItems.length;
    var sellingCount = pubItems.filter(function(i) { return i.status === 'selling'; }).length;
    var soldCount = pubItems.filter(function(i) { return i.status === 'sold'; }).length;
    var offCount = pubItems.filter(function(i) { return i.status === 'off'; }).length;
    document.getElementById('tab-count-all').textContent = allCount;
    document.getElementById('tab-count-selling').textContent = sellingCount;
    document.getElementById('tab-count-sold').textContent = soldCount;
    document.getElementById('tab-count-off').textContent = offCount;
}


function renderPublished(filter) {
    var list = document.getElementById('pub-list');
    list.innerHTML = '';
    var items = filter === 'all' ? pubItems : pubItems.filter(function(i){ return i.status === filter; });
    document.getElementById('pub-count').textContent = '共 ' + items.length + ' 件宝贝';
    updateTabCounts();
    items.forEach(function(item) {
        var s = statusMap[item.status];
        var btns = '';
        if (item.status === 'selling') {
            btns = '<button class="btn-off px-4 py-1.5 border border-gray-300 text-gray-600 rounded-full text-sm hover:bg-gray-50 transition">下架</button>' +
                   '<button class="btn-edit px-4 py-1.5 border border-gray-300 text-gray-600 rounded-full text-sm hover:bg-gray-50 transition">编辑</button>';
        } else if (item.status === 'sold') {
            btns = '<button class="btn-view px-4 py-1.5 border border-gray-300 text-gray-600 rounded-full text-sm hover:bg-gray-50 transition">查看详情</button>';
        } else {
            btns = '<button class="btn-edit px-4 py-1.5 border border-purple-300 text-purple-600 rounded-full text-sm hover:bg-purple-50 transition">重新上架</button>' +
                   '<button class="btn-delete px-4 py-1.5 border border-red-200 text-red-400 rounded-full text-sm hover:bg-red-50 transition">删除</button>';
        }
        var card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition';
        var sellerLine = currentUsername ? '<p class="text-xs text-gray-400 mt-0.5">卖家：' + currentUsername + '</p>' : '';
        card.innerHTML =
            '<a href="product.html?id=' + item.id + '" class="flex gap-4 mb-4 cursor-pointer">' +
                '<div class="w-24 h-24 bg-gray-50 rounded-xl flex-shrink-0 overflow-hidden border border-gray-100">' +
                    (item.images && item.images.length > 0
                        ? '<img src="' + (item.images[0].startsWith('http') || item.images[0].startsWith('/') ? item.images[0] : '/resources/' + item.images[0]) + '" class="w-full h-full object-cover">'
                        : '<div class="w-full h-full bg-gradient-to-br ' + item.bg + ' flex items-center justify-center text-3xl">' + item.emoji + '</div>') +
                '</div>' +
                '<div class="flex-1 flex flex-col justify-between min-w-0 py-1">' +
                    '<div class="flex justify-between items-start gap-4">' +
                        '<div class="min-w-0"><h3 class="text-sm md:text-base text-gray-800 leading-snug line-clamp-2">' + item.title + '</h3>' + sellerLine + '</div>' +
                        '<span class="text-[11px] px-2 py-0.5 rounded flex-shrink-0 ' + s.cls + '">' + s.text + '</span>' +
                    '</div>' +
                    '<div class="flex items-center justify-between mt-2">' +
                        '<span class="text-orange-500 font-black text-lg">¥' + item.price + '</span>' +
                        '<div class="flex items-center space-x-3 text-xs text-gray-400">' +
                            '<span>' + item.wants + '人想要</span>' +
                            '<span>' + item.views + '次浏览</span>' +
                            '<span>' + item.time + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</a>' +
            '<div class="flex justify-end gap-3 pt-3 border-t border-gray-50">' + btns + '</div>';

        // 按钮事件
        var editBtn = card.querySelector('.btn-edit');
        if (editBtn) editBtn.addEventListener('click', function(e) { e.stopPropagation(); openEditModal(item); });
        var deleteBtn = card.querySelector('.btn-delete');
        if (deleteBtn) deleteBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteItem(item.id); });
        var viewBtn = card.querySelector('.btn-view');
        if (viewBtn) viewBtn.addEventListener('click', function(e) { e.stopPropagation(); window.location.href = 'product.html?id=' + item.id; });
        var offBtn = card.querySelector('.btn-off');
        if (offBtn) offBtn.addEventListener('click', function(e) { e.stopPropagation(); offShelfItem(item.id); });

        list.appendChild(card);
    });
}

// 下架商品
async function offShelfItem(itemId) {
    if (!confirm('确定要下架该商品吗？')) return;
    try {
        var res = await fetch('https://api.szsummer.com/api/market/items/' + itemId + '/off', { method: 'PUT', credentials: 'include' });
        if (res.ok) {
            showToast('已下架');
            var item = pubItems.find(function(i) { return i.id === itemId; });
            if (item) item.status = 'off';
            renderPublished(currentFilter);
        } else {
            showToast('下架失败');
        }
    } catch (e) {
        showToast('网络错误');
    }
}

// 删除商品
async function deleteItem(itemId) {
    if (!confirm('确定要删除该商品吗？删除后不可恢复。')) return;
    try {
        var res = await fetch('https://api.szsummer.com/api/market/items/' + itemId, { method: 'DELETE', credentials: 'include' });
        if (res.ok) {
            showToast('已删除');
            pubItems = pubItems.filter(function(i) { return i.id !== itemId; });
            renderPublished(currentFilter);
        } else {
            showToast('删除失败');
        }
    } catch (e) {
        showToast('网络错误');
    }
}

// 编辑弹窗
var editModal = document.getElementById('edit-modal');
var editCloseBtn = document.getElementById('edit-close-btn');
var editForm = document.getElementById('edit-form');

function openEditModal(item) {
    document.getElementById('edit-item-id').value = item.id;
    document.getElementById('edit-title').value = item.title || '';
    document.getElementById('edit-price').value = item.price || '';
    document.getElementById('edit-description').value = item.description || '';
    document.getElementById('edit-category').value = item.category || '';
    document.getElementById('edit-condition').value = item.condition || '';
    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
}

function closeEditModal() {
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
}

editCloseBtn.addEventListener('click', closeEditModal);
editModal.addEventListener('click', function(e) { if (e.target === editModal) closeEditModal(); });

editForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    var itemId = document.getElementById('edit-item-id').value;
    var data = {
        title: document.getElementById('edit-title').value,
        price: parseFloat(document.getElementById('edit-price').value),
        description: document.getElementById('edit-description').value,
        category: document.getElementById('edit-category').value,
        condition: parseInt(document.getElementById('edit-condition').value) || null,
        status: 'available'
    };
    try {
        var res = await fetch('https://api.szsummer.com/api/market/items/' + itemId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showToast('上架成功');
            closeEditModal();
            var item = pubItems.find(function(i) { return i.id === itemId; });
            if (item) {
                item.title = data.title;
                item.price = data.price;
                item.description = data.description;
                item.category = data.category;
                item.status = 'selling';
            }
            renderPublished(currentFilter);
        } else {
            showToast('操作失败，请重试');
        }
    } catch (err) {
        showToast('网络错误');
    }
});

var currentFilter = 'all';
renderPublished('all');

// 从API加载我发布的商品
(async function() {
    try {
        var userRes = await fetch('https://api.szsummer.com/api/users/me', { credentials: 'include' });
        if (userRes.ok) {
            var user = await userRes.json();
            currentUsername = user.username || '';
        } else if (userRes.status === 401) {
            window.location.href = '/login?redirect=/azure_trade/mypublish.html';
            return;
        }

        var res = await fetch('https://api.szsummer.com/api/market/users/me/items', { credentials: 'include' });
        if (res.ok) {
            var items = await res.json();
            if (items && items.length > 0) {
                pubItems = items.map(function(item) {
                    var status = 'selling';
                    if (item.status === 'sold') status = 'sold';
                    else if (item.status === 'off' || item.status === 'removed') status = 'off';
                    else if (item.status === 'available') status = 'selling';

                    var timeStr = '';
                    if (item.createdAt) {
                        var diff = Date.now() - new Date(item.createdAt).getTime();
                        var hours = Math.floor(diff / 3600000);
                        if (hours < 1) timeStr = '刚刚';
                        else if (hours < 24) timeStr = hours + '小时前';
                        else if (hours < 168) timeStr = Math.floor(hours / 24) + '天前';
                        else timeStr = Math.floor(hours / 168) + '周前';
                    }

                    return {
                        id: item.itemId,
                        title: item.title,
                        price: item.price,
                        description: item.description || '',
                        category: item.category || '',
                        condition: item.condition || '',
                        emoji: '📦',
                        bg: 'from-purple-200 to-pink-300',
                        wants: item.wants || 0,
                        views: item.views || 0,
                        status: status,
                        time: timeStr,
                        images: item.images || []
                    };
                });
                renderPublished(currentFilter);
            }
        }
    } catch (err) {
        console.error('加载发布商品失败:', err);
    }
})();

// Tab switching
document.querySelectorAll('.pub-tab').forEach(function(tab) {
    tab.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.pub-tab').forEach(function(t) {
            t.classList.remove('text-purple-600', 'font-bold');
            t.classList.add('text-gray-600');
            var bar = t.querySelector('.tab-bar');
            if (bar) bar.remove();
        });
        tab.classList.remove('text-gray-600');
        tab.classList.add('text-purple-600', 'font-bold');
        var bar = document.createElement('div');
        bar.className = 'tab-bar absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 bg-purple-600 rounded-full';
        tab.style.position = 'relative';
        tab.appendChild(bar);
        currentFilter = tab.getAttribute('data-filter');
        renderPublished(currentFilter);
    });
});

// Sidebar toggle
var toggle = document.getElementById('trade-toggle');
var sub = document.getElementById('trade-sub');
var arrow = document.getElementById('trade-arrow');
toggle.addEventListener('click', function() {
    var hidden = sub.style.display === 'none';
    sub.style.display = hidden ? '' : 'none';
    arrow.classList.toggle('rotate-180', hidden);
});

// 我的投稿 展开/收起
var contributionToggle = document.getElementById('contribution-toggle');
var contributionSub = document.getElementById('contribution-sub');
var contributionArrow = document.getElementById('contribution-arrow');
if(contributionToggle && contributionSub && contributionArrow) {
    contributionToggle.addEventListener('click', function() {
        var hidden = contributionSub.style.display === 'none';
        contributionSub.style.display = hidden ? '' : 'none';
        contributionArrow.classList.toggle('rotate-180', hidden);
    });
}

// 退出登录
var logoutBtn = document.getElementById('logout-btn');
if (logoutBtn) {
    logoutBtn.addEventListener('click', async function () {
        try {
            await fetch('https://api.szsummer.com/api/auth/logout', { method: 'POST', credentials: 'include' });
        } catch (e) {}
        window.location.href = '/login?redirect=/azure_trade/trade';
    });
}

// 侧边栏气泡数字
(function() {
    var profile = {};
    try { profile = JSON.parse(localStorage.getItem('userProfile') || '{}'); } catch(e) {}
    var published = JSON.parse(localStorage.getItem('publishedItems') || '[]');
    var sold = JSON.parse(localStorage.getItem('soldItems') || '[]');
    var bought = JSON.parse(localStorage.getItem('boughtItems') || '[]');

    var counts = {
        'sidebar-publish-count': profile.posts || published.length,
        'sidebar-sell-count': profile.sell || sold.length,
        'sidebar-buy-count': profile.buy || bought.length,
        'sidebar-fav-count': profile.favorites || JSON.parse(localStorage.getItem('favoriteItems') || '[]').length
    };
    Object.keys(counts).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = counts[id];
    });
})();
</script>
