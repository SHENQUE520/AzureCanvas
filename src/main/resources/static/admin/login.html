<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MUST星河论坛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.dark_mode.css">
    <link rel="stylesheet" href="../css/color_scheme/colors.primary.css">
    <link rel="stylesheet" href="../css/app.major.css">
    <link rel="stylesheet" href="../css/attributes.texts.css">
    <style>
        body {
            background-color: var(--bg-color, #160228);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #4a7db5;
        }

        .auth-logo {
            margin-bottom: 30px;
        }

        .auth-logo i {
            font-size: 3rem;
            color: #2565b0;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(37, 101, 176, 0.5));
        }

        .auth-logo h1 {
            margin: 0;
            color: #0a2a44;
            font-size: 1.5rem;
        }

        .auth-logo p {
            margin: 5px 0 0 0;
            color: #1e3a5f;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a2a44;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #4a7db5;
            border-radius: 8px;
            background-color: white;
            color: #0a2a44;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #2565b0;
            box-shadow: 0 0 0 3px rgba(37, 101, 176, 0.2);
            background-color: white;
        }

        .form-actions {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #2565b0;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 101, 176, 0.3);
        }

        .btn-primary:hover {
            background-color: #0e4b8f;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 101, 176, 0.4);
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #1e3a5f;
        }

        .auth-footer a {
            color: #2565b0;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #e74c3c;
        }

        .success-message {
            background-color: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #2ecc71;
        }
    </style>
</head>

<body class="light-mode">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-crown"></i>
            <h1>登录</h1>
            <p>欢迎回来</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名 / 邮箱 / 手机号</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名、邮箱或手机号"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">登录</button>
                <a href="../auth/register.html" class="btn btn-primary">注册</a>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="auth-footer">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        // 自动检测 API 基础地址
        const API_BASE = window.location.origin === 'http://127.0.0.1:5500' ? 'http://localhost:8088' : '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 清空消息
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // 存储token
                    localStorage.setItem('token', data.token);
                    successMessage.textContent = '登录成功，正在跳转...';
                    successMessage.style.display = 'block';
                    // 根据用户角色跳转
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            // 管理员跳转到机器人管理页面
                            window.location.href = 'robots.html';
                        } else if (data.user.role === 'moderator') {
                            // 版主跳转到个人中心
                            window.location.href = '../user/user.html';
                        } else {
                            // 普通用户跳转到论坛首页
                            window.location.href = '../forum/index.html';
                        }
                    }, 1000);
                } else {
                    const error = await response.text();
                    errorMessage.textContent = '登录失败：' + error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>

</html>
