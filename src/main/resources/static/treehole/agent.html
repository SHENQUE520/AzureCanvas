<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent — 树洞</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .agent-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 64px);
      max-width: 100%;
    }

    .agent-sidebar {
      border-right: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .agent-sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .agent-sidebar-title {
      font-weight: 700;
      font-size: 1rem;
    }

    .new-chat-btn {
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
    }

    .new-chat-btn:hover {
      background: var(--hover-bg);
      color: var(--text);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-list-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.9rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .chat-list-item:hover {
      background: var(--hover-bg);
    }

    .chat-list-item.active {
      background: var(--bg-inset);
      font-weight: 500;
    }

    .chat-list-item i {
      color: var(--text-muted);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .chat-list-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-list-item-time {
      font-size: 0.72rem;
      color: var(--text-light);
      flex-shrink: 0;
    }

    .agent-sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-main {
      display: flex;
      flex-direction: column;
      background: var(--bg-subtle);
      overflow: hidden;
    }

    .agent-topbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-topbar-title {
      font-weight: 600;
      font-size: 1rem;
      flex: 1;
    }

    .agent-topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .agent-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .agent-welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .agent-welcome h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .agent-welcome p {
      color: var(--text-muted);
      font-size: 0.97rem;
      margin-bottom: 28px;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 520px;
      width: 100%;
    }

    .suggestion-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
    }

    .suggestion-card:hover {
      border-color: #888;
      box-shadow: var(--shadow-sm);
    }

    .suggestion-card-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .suggestion-card-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .msg-group {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
    }

    .msg-group.user-group {
      flex-direction: row-reverse;
      margin-left: auto;
    }

    .msg-group-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .agent-avatar-icon {
      background: var(--text);
      color: #fff;
    }

    .user-avatar-icon {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg-group-body {
      flex: 1;
      min-width: 0;
    }

    .msg-group-name {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .user-group .msg-group-name {
      text-align: right;
    }

    .msg-bubble-agent {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 12px 16px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
    }

    .msg-bubble-user {
      background: var(--text);
      color: #fff;
      border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);
      padding: 12px 16px;
      font-size: 0.95rem;
      line-height: 1.7;
      word-break: break-word;
      display: inline-block;
    }

    .user-group .msg-group-body {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      width: fit-content;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s ease infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .agent-input-area {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }

    .agent-input-box {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: var(--transition);
    }

    .agent-input-box:focus-within {
      border-color: #888;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
      background: var(--bg);
    }

    .agent-textarea {
      width: 100%;
      padding: 12px 16px;
      border: none;
      outline: none;
      font-size: 0.97rem;
      background: transparent;
      color: var(--text);
      resize: none;
      min-height: 52px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.6;
    }

    .agent-input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-top: 1px solid var(--border-muted);
    }

    .agent-input-tools {
      display: flex;
      gap: 4px;
    }

    .agent-tool-btn {
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .agent-tool-btn:hover {
      background: var(--hover-bg);
      color: var(--text);
    }

    .agent-send-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      border: none;
      background: var(--text);
      color: #fff;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .agent-send-btn:hover { background: #333; }

    .agent-send-btn:disabled {
      background: var(--bg-inset);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .agent-input-hint {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 8px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .agent-layout { grid-template-columns: 1fr; }
      .agent-sidebar { display: none; }
    }

    /* ===== 图片预览栏 ===== */
    .image-preview-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 0;
      min-height: 0;
      transition: min-height 0.2s ease;
    }

    .image-preview-bar.has-images {
      min-height: 56px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-muted);
    }

    .image-preview-item {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      animation: previewIn 0.25s ease forwards;
    }

    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-item .preview-delete {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease;
      cursor: pointer;
      border: none;
    }

    .image-preview-item:hover .preview-delete { opacity: 1; }

    @keyframes previewIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ===== 模型选择器（输入栏上方）===== */
    .input-model-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 20px 0;
    }

    .input-model-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .model-chip-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .model-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .model-chip:hover {
      border-color: #888;
      color: var(--text);
    }

    .model-chip.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .model-chip .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }

    /* ===== AI 加载发光动画 ===== */
    .ai-loading-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      max-width: fit-content;
    }

    .ai-loading-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .ai-loading-bubble {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 12px 22px;
      position: relative;
      overflow: hidden;
      min-width: 120px;
      min-height: 24px;
    }

    .ai-loading-bubble::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(126, 194, 255, 0.08) 25%,
        rgba(126, 194, 255, 0.18) 50%,
        rgba(126, 194, 255, 0.08) 75%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: glowSweep 1.5s ease-in-out infinite;
      border-radius: inherit;
    }

    .ai-loading-dots {
      display: flex;
      gap: 5px;
      position: relative;
      z-index: 1;
    }

    .ai-loading-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .ai-loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .ai-loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes glowSweep {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes dotPulse {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .msg-image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .msg-image-grid img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .msg-image-grid img:hover { transform: scale(1.03); }
  </style>
</head>

<body>
<nav class="navbar">
  <div class="nav-logo">
    <i class="fas fa-tree"></i> Azurecanvas-树洞
    <span class="badge">MUST</span>
  </div>
  <div class="nav-actions" style="margin-left:auto">
    <button class="btn" onclick="window.location.href='index.html'">
      <i class="fas fa-arrow-left"></i> 返回主页
    </button>
  </div>
</nav>

<div class="agent-layout">
  <div class="agent-sidebar">
    <div class="agent-sidebar-header">
      <span class="agent-sidebar-title">对话历史</span>
      <button class="new-chat-btn" id="newChatBtn" title="新建对话"><i class="fas fa-plus"></i></button>
    </div>
    <div class="chat-list" id="chatList">
      <div class="chat-list-item active">
        <i class="fas fa-comment-dots"></i>
        <span class="chat-list-item-text">新对话</span>
        <span class="chat-list-item-time">刚刚</span>
      </div>
    </div>
    <div class="agent-sidebar-footer">
      <i class="fas fa-robot"></i>
      MUST 树洞 AI 助手
    </div>
  </div>

  <div class="agent-main">
    <div class="agent-topbar">
      <span class="agent-topbar-title" id="chatTitle">新对话</span>
      <div class="agent-topbar-actions"></div>
    </div>

    <div class="agent-messages" id="agentMessages">
      <div class="agent-welcome" id="agentWelcome">
        <div class="agent-welcome-icon"><i class="fas fa-robot"></i></div>
        <h2>你好，我是 MUST 树洞 Agent</h2>
        <p>我可以帮你解答校园问题、倾听烦恼、提供建议</p>
        <div class="suggestion-grid">
          <div class="suggestion-card" data-prompt="图书馆怎么预约座位？">
            <div class="suggestion-card-title">📚 图书馆预约</div>
            <div class="suggestion-card-sub">怎么预约图书馆座位？</div>
          </div>
          <div class="suggestion-card" data-prompt="最近压力很大，有什么解压方法推荐吗？">
            <div class="suggestion-card-title">💆 解压建议</div>
            <div class="suggestion-card-sub">最近压力很大怎么办？</div>
          </div>
          <div class="suggestion-card" data-prompt="帮我写一篇关于校园生活的树洞帖子">
            <div class="suggestion-card-title">✍️ 帮我写帖子</div>
            <div class="suggestion-card-sub">生成一条树洞内容</div>
          </div>
          <div class="suggestion-card" data-prompt="期末复习有什么高效方法？">
            <div class="suggestion-card-title">🎓 学习方法</div>
            <div class="suggestion-card-sub">期末复习高效技巧</div>
          </div>
        </div>
      </div>
    </div>

    <div class="agent-input-area">
      <!-- 模型选择器 -->
      <div class="input-model-selector">
        <span class="input-model-label">模型</span>
        <div class="model-chip-group" id="modelChipGroup"></div>
      </div>

      <!-- 图片预览栏 -->
      <div class="image-preview-bar" id="imagePreviewBar"></div>

      <div class="agent-input-box">
        <textarea class="agent-textarea" id="agentInput" placeholder="向 MUST Agent 提问…" rows="1"></textarea>
        <div class="agent-input-footer">
          <div class="agent-input-tools">
            <button class="agent-tool-btn" id="uploadImageBtn" title="上传图片"><i class="far fa-image"></i></button>
            <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
            <button class="agent-tool-btn" title="表情"><i class="far fa-smile"></i></button>
            <button class="agent-tool-btn" title="清空对话" id="clearChatBtn"><i class="fas fa-trash-alt"></i></button>
          </div>
          <button class="agent-send-btn" id="agentSendBtn" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
      <div class="agent-input-hint">AzureCanvas Agent 仅供参考，不代表官方意见</div>
    </div>
  </div>
</div>

<script>
  const OLLAMA_CONFIG = {
    host: 'http://192.168.1.100:11434',
    model: 'qwen:4b'
  };

  const AVAILABLE_MODELS = [
    { id: 'qwen:4b', name: 'qwen 4B', desc: '轻量快速' },
    { id: 'deepseek-v3.1:671b-cloud', name: 'deepseek-v3.1 671B', desc: '强推理' },
    { id: 'deepseek-r1:7b', name: 'deepseek-r1 7B', desc: '深度思考' }
  ];

  const STORAGE_KEY = 'must-treehole-sessions';
  const MODEL_STORAGE_KEY = 'must-agent-model';
  const SYSTEM_PROMPT = '你是 树洞 AI 助手，语气温暖、简短、友好。你帮助用户解答校园问题、倾听烦恼、提供建议。请自然地回复用户的问题。';
  const MAX_IMAGES = 6;
  const MAX_IMAGE_SIZE = 10 * 1024 * 1024;

  let sessions = [];
  let currentSessionId = null;
  let isTyping = false;
  let abortController = null;
  let currentModel = localStorage.getItem(MODEL_STORAGE_KEY) || 'qwen:4b';
  let pendingImages = [];

  const agentMessages = document.getElementById('agentMessages');
  const agentWelcome = document.getElementById('agentWelcome');
  const agentInput = document.getElementById('agentInput');
  const agentSendBtn = document.getElementById('agentSendBtn');
  const chatListEl = document.getElementById('chatList');
  const chatTitleEl = document.getElementById('chatTitle');
  const imagePreviewBar = document.getElementById('imagePreviewBar');
  const modelChipGroup = document.getElementById('modelChipGroup');

  function initModelChips() {
    modelChipGroup.innerHTML = '';
    AVAILABLE_MODELS.forEach(m => {
      const chip = document.createElement('div');
      chip.className = `model-chip${m.id === currentModel ? ' active' : ''}`;
      chip.dataset.model = m.id;
      chip.innerHTML = `<span class="chip-dot"></span>${m.name}`;
      chip.title = m.desc;
      chip.addEventListener('click', () => selectModel(m.id));
      modelChipGroup.appendChild(chip);
    });
  }

  function selectModel(modelId) {
    if (isTyping) return;
    currentModel = modelId;
    OLLAMA_CONFIG.model = modelId;
    localStorage.setItem(MODEL_STORAGE_KEY, modelId);
    modelChipGroup.querySelectorAll('.model-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.model === modelId);
    });
    console.log(`[Agent] 切换模型 → ${modelId}`);
  }

  function loadSessions() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      sessions = raw ? JSON.parse(raw) : [];
      if (!sessions.length) {
        createNewSession();
      } else {
        currentSessionId = sessions[0].id;
        renderChatList();
        renderCurrentSession();
      }
    } catch (e) {
      console.error('加载会话失败:', e);
      sessions = [];
      createNewSession();
    }
  }

  function saveSessions() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch (e) { console.error('保存会话失败:', e); }
  }

  function createNewSession() {
    const session = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title: '新对话', messages: [], createdAt: Date.now() };
    sessions.unshift(session);
    currentSessionId = session.id;
    saveSessions();
    renderChatList();
    renderCurrentSession();
  }

  function getCurrentSession() { return sessions.find(s => s.id === currentSessionId) || null; }

  function switchSession(sessionId) { if (!isTyping && sessionId !== currentSessionId) { currentSessionId = sessionId; renderChatList(); renderCurrentSession(); } }

  function deleteSession(sessionId, event) {
    event.stopPropagation();
    if (sessions.length <= 1) { alert('至少保留一个会话'); return; }
    sessions = sessions.filter(s => s.id !== sessionId);
    if (currentSessionId === sessionId) currentSessionId = sessions[0].id;
    saveSessions();
    renderChatList();
    renderCurrentSession();
  }

  function renderChatList() {
    chatListEl.innerHTML = '';
    sessions.forEach(session => {
      const item = document.createElement('div');
      item.className = `chat-list-item${session.id === currentSessionId ? ' active' : ''}`;
      item.innerHTML = `<i class="fas fa-comment-dots"></i><span class="chat-list-item-text">${escapeHtml(session.title)}</span><span class="chat-list-item-time">${formatTime(session.createdAt)}</span>${sessions.length > 1 ? '<i class="fas fa-times" style="color:var(--text-muted);font-size:0.7rem;cursor:pointer;margin-left:4px;" onclick=""></i>' : ''}`;
      item.addEventListener('click', () => switchSession(session.id));
      const closeBtn = item.querySelector('.fa-times');
      if (closeBtn) closeBtn.addEventListener('click', (e) => deleteSession(session.id, e));
      chatListEl.appendChild(item);
    });
  }

  function renderCurrentSession() {
    const session = getCurrentSession();
    if (!session) return;
    chatTitleEl.textContent = session.title;
    agentMessages.innerHTML = '';
    if (session.messages.length === 0) {
      agentWelcome.style.display = 'flex';
      agentMessages.appendChild(agentWelcome);
    } else {
      agentWelcome.style.display = 'none';
      session.messages.forEach(msg => appendMessage(msg.role, msg.content, null, false));
    }
    agentSendBtn.disabled = !agentInput.value.trim() && pendingImages.length === 0 || isTyping;
  }

  function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

  function formatTime(timestamp) {
    const d = new Date(timestamp), diff = Date.now() - timestamp;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (d.toDateString() === new Date().toDateString()) return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
  }

  function formatContent(text) { return escapeHtml(text).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

  /* ===== 图片预览栏管理 ===== */
  function renderImagePreview() {
    imagePreviewBar.innerHTML = '';
    if (pendingImages.length > 0) {
      imagePreviewBar.classList.add('has-images');
      pendingImages.forEach((imgData, idx) => {
        const item = document.createElement('div');
        item.className = 'image-preview-item';
        item.innerHTML = `<img src="${imgData.preview}" alt="预览"><button class="preview-delete" data-idx="${idx}"><i class="fas fa-times"></i></button>`;
        item.querySelector('.preview-delete').addEventListener('click', (e) => { e.stopPropagation(); removePendingImage(idx); });
        imagePreviewBar.appendChild(item);
      });
    } else {
      imagePreviewBar.classList.remove('has-images');
    }
    agentSendBtn.disabled = !agentInput.value.trim() && pendingImages.length === 0 || isTyping;
  }

  function addPendingImage(file) {
    if (pendingImages.length >= MAX_IMAGES) { alert(`最多添加 ${MAX_IMAGES} 张图片`); return; }
    if (!file.type.startsWith('image/')) { alert('请选择图片文件'); return; }
    if (file.size > MAX_IMAGE_SIZE) { alert('单张图片不能超过 10MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => { pendingImages.push({ file, preview: ev.target.result, base64: ev.target.result }); renderImagePreview(); };
    reader.readAsDataURL(file);
  }

  function removePendingImage(idx) { pendingImages.splice(idx, 1); renderImagePreview(); }
  function clearPendingImages() { pendingImages = []; renderImagePreview(); }

  /* ===== AI 加载动画 ===== */
  function showAILoading() {
    hideAILoading();
    const wrapper = document.createElement('div');
    wrapper.className = 'ai-loading-wrapper';
    wrapper.id = 'aiLoadingIndicator';
    wrapper.innerHTML = `<div class="ai-loading-avatar"><i class="fas fa-robot"></i></div><div class="ai-loading-bubble"><div class="ai-loading-dots"><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div></div></div>`;
    agentMessages.appendChild(wrapper);
    agentMessages.scrollTop = agentMessages.scrollHeight;
  }

  function hideAILoading() { const el = document.getElementById('aiLoadingIndicator'); if (el) el.remove(); }

  /* ===== 消息发送与流式接收 ===== */
  async function sendMessage() {
    const text = agentInput.value.trim();
    if ((!text && pendingImages.length === 0) || isTyping) return;

    const session = getCurrentSession();
    if (!session) return;

    abortController = new AbortController();
    isTyping = true;
    agentSendBtn.disabled = true;

    if (session.messages.length === 0 && text) {
      session.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
      renderChatList();
      chatTitleEl.textContent = session.title;
    }

    if (pendingImages.length > 0) {
      appendMessageWithImages('user', text, pendingImages.map(p => p.base64));
    } else {
      appendMessage('user', text);
    }

    session.messages.push({ role: 'user', content: text, images: pendingImages.map(p => p.base64) });
    saveSessions();

    agentInput.value = '';
    agentInput.style.height = 'auto';
    clearPendingImages();

    showAILoading();
    agentWelcome.style.display = 'none';

    try {
      const ollamaMessages = [{ role: 'system', content: SYSTEM_PROMPT }];
      session.messages.forEach(m => {
        if (m.role === 'user') ollamaMessages.push({ role: 'user', content: m.content || '[图片]' });
        else ollamaMessages.push({ role: 'assistant', content: m.content });
      });

      const requestBody = {
        model: currentModel,
        messages: ollamaMessages,
        stream: true,
        options: { temperature: 0.7, num_predict: 2048 }
      };

      const hasImagesInHistory = session.messages.some(m => m.images && m.images.length > 0);
      if (hasImagesInHistory) {
        requestBody.images = [];
        session.messages.forEach(m => {
          if (m.images) m.images.forEach(img => {
            requestBody.images.push(img.startsWith('data:') ? img.split(',')[1] : img);
          });
        });
      }

      const response = await fetch(`${OLLAMA_CONFIG.host}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      hideAILoading();
      const tempId = 'msg-' + Date.now();
      appendMessage('assistant', '', tempId);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let aiReply = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n').filter(l => l.trim())) {
          try {
            const data = JSON.parse(line);
            if (data.done) continue;
            const delta = data.message?.content;
            if (delta) { aiReply += delta; updateMessage(tempId, aiReply); }
          } catch (e) {}
        }
      }

      session.messages.push({ role: 'assistant', content: aiReply });
      saveSessions();
    } catch (err) {
      hideAILoading();
      if (err.name !== 'AbortError') {
        session.messages.push({ role: 'assistant', content: '抱歉，连接失败，请稍后再试~' });
        appendMessage('assistant', '抱歉，连接失败，请稍后再试~');
        saveSessions();
      }
    } finally {
      isTyping = false;
      abortController = null;
      agentSendBtn.disabled = !agentInput.value.trim() && pendingImages.length === 0;
    }
  }

  function appendMessage(role, content, messageId = null, scroll = true) {
    const isUser = role === 'user';
    const group = document.createElement('div');
    group.className = `msg-group ${isUser ? 'user-group' : ''}`;
    const avatarClass = isUser ? 'user-avatar-icon' : 'agent-avatar-icon';
    const avatarContent = isUser ? '我' : '<i class="fas fa-robot"></i>';
    const bubbleClass = isUser ? 'msg-bubble-user' : 'msg-bubble-agent';
    const name = isUser ? '你' : '树洞 AI';
    group.innerHTML = `<div class="msg-group-avatar ${avatarClass}">${avatarContent}</div><div class="msg-group-body"><div class="msg-group-name">${name}</div><div class="${bubbleClass}" ${messageId ? `id="${messageId}"` : ''}>${formatContent(content)}</div></div>`;
    agentMessages.appendChild(group);
    if (scroll) agentMessages.scrollTop = agentMessages.scrollHeight;
  }

  function appendMessageWithImages(role, text, imageUrls) {
    const isUser = role === 'user';
    const group = document.createElement('div');
    group.className = `msg-group ${isUser ? 'user-group' : ''}`;
    const avatarClass = isUser ? 'user-avatar-icon' : 'agent-avatar-icon';
    const avatarContent = isUser ? '我' : '<i class="fas fa-robot"></i>';
    const bubbleClass = isUser ? 'msg-bubble-user' : 'msg-bubble-agent';
    const name = isUser ? '你' : '树洞 AI';
    let bodyHtml = `<div class="msg-group-name">${name}</div><div class="${bubbleClass}">`;
    if (text) bodyHtml += formatContent(text);
    if (imageUrls && imageUrls.length > 0) {
      bodyHtml += `<div class="msg-image-grid">`;
      imageUrls.forEach(url => { bodyHtml += `<img src="${url}" alt="图片">`; });
      bodyHtml += `</div>`;
    }
    bodyHtml += `</div>`;
    group.innerHTML = `<div class="msg-group-avatar ${avatarClass}">${avatarContent}</div><div class="msg-group-body">${bodyHtml}</div>`;
    agentMessages.appendChild(group);
    agentMessages.scrollTop = agentMessages.scrollHeight;
  }

  function updateMessage(messageId, content) {
    const el = document.getElementById(messageId);
    if (el) { el.innerHTML = formatContent(content); agentMessages.scrollTop = agentMessages.scrollHeight; }
  }

  /* ===== 事件绑定 ===== */
  agentInput.addEventListener('input', () => {
    agentSendBtn.disabled = !agentInput.value.trim() && pendingImages.length === 0 || isTyping;
    agentInput.style.height = 'auto';
    agentInput.style.height = Math.min(agentInput.scrollHeight, 160) + 'px';
  });

  agentInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  agentSendBtn.addEventListener('click', sendMessage);

  document.querySelectorAll('.suggestion-card').forEach(card => {
    card.addEventListener('click', () => { agentInput.value = card.dataset.prompt; agentSendBtn.disabled = false; sendMessage(); });
  });

  document.getElementById('newChatBtn').addEventListener('click', () => { if (!isTyping) createNewSession(); });

  document.getElementById('clearChatBtn').addEventListener('click', () => {
    if (isTyping) return;
    const s = getCurrentSession();
    if (s) { s.messages = []; s.title = '新对话'; saveSessions(); renderCurrentSession(); renderChatList(); }
    clearPendingImages();
  });

  document.getElementById('uploadImageBtn').addEventListener('click', () => document.getElementById('imageInput').click());

  document.getElementById('imageInput').addEventListener('change', e => {
    Array.from(e.target.files).forEach(file => addPendingImage(file));
    e.target.value = '';
  });

  initModelChips();
  loadSessions();
</script>

      }
  }
</script>
